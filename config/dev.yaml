# ============================================================================
# Dev-Konfiguration: Lokale Overrides fuer die Entwicklungsumgebung
# Zweck: Ueberschreibt base.yaml Werte fuer lokalen Docker-Compose-Stack
# ============================================================================

runtime:
  environment: dev

sources:
  # --- Olist: Lokales Manifest fuer Seed-Dateien ---
  olist:
    local_manifest: data/sample/batch/olist_manifest.yaml
    schedule: "0 3 * * *"    # Taeglich um 03:00 (nur fuer Kestra-Referenz)

  # --- Retailrocket: Lokaler Kafka-Broker (Redpanda) ---
  retailrocket:
    bootstrap_servers: localhost:9092
    starting_offsets: earliest

  # --- Open Food Facts: Verzoegerung zwischen API-Aufrufen ---
  open_food_facts:
    request_delay_seconds: 1

  # --- Open-Meteo: 3 brasilianische Staedte fuer Wetter-Enrichment ---
  open_meteo:
    geographies:
      - city: sao_paulo
        latitude: -23.5505
        longitude: -46.6333
      - city: rio_de_janeiro
        latitude: -22.9068
        longitude: -43.1729
      - city: belo_horizonte
        latitude: -19.9167
        longitude: -43.9345

  # --- Frankfurter: Zielwaehrungen ---
  frankfurter:
    quote_currencies:
      - USD
      - BRL

warehouse:
  target: dev

notes:
  - "TODO: seed local PostgreSQL raw tables with Olist snapshots or staged CSV files."
  - "TODO: replace Retailrocket sample replay files with the full dataset before scale testing."
  - "TODO: supply Kaggle credentials locally before automating real Olist or Retailrocket downloads."
