id: omnichannel_commerce_daily
namespace: omnichannel.platform.dev
description: Daily local dev flow for Olist batch ingestion, Retailrocket replay, dbt layers, and quality checks.

inputs:
  - id: environment
    type: STRING
    defaults: dev
  - id: streaming_mode
    type: STRING
    defaults: replay

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 6 * * *"

tasks:
  - id: start_log
    type: io.kestra.plugin.core.log.Log
    message: "Starting {{ flow.id }} for env={{ inputs.environment }}"

  - id: batch_ingestion
    type: io.kestra.plugin.scripts.shell.Commands
    warningOnStdErr: false
    commands:
      - python -m omnichannel_platform.batch.commerce_batch_ingestion --env {{ inputs.environment }}

  - id: retailrocket_replay
    type: io.kestra.plugin.scripts.shell.Commands
    warningOnStdErr: false
    commands:
      - python -m omnichannel_platform.streaming.clickstream_consumer --env {{ inputs.environment }} --mode {{ inputs.streaming_mode }}

  - id: warehouse_layers
    type: io.kestra.plugin.scripts.shell.Commands
    warningOnStdErr: false
    commands:
      - python -m omnichannel_platform.warehouse.layer_catalog --env {{ inputs.environment }}

  - id: dbt_build_note
    type: io.kestra.plugin.core.log.Log
    message: "TODO: run dbt build inside a Python/dbt-capable image or worker once runtime packaging is added."

  - id: run_quality
    type: io.kestra.plugin.scripts.shell.Commands
    warningOnStdErr: false
    commands:
      - python -m omnichannel_platform.quality.rules_catalog --non-strict

  - id: finish_log
    type: io.kestra.plugin.core.log.Log
    message: "Flow finished for env={{ inputs.environment }}"

# TODO:
# - run these tasks inside a dedicated image that includes the project extras
# - parameterize namespace, secrets, and dbt target before promoting beyond local development
# - replace the dbt note with a real `dbt build` task once the runtime packaging is in place
