# ============================================================================
# dbt CI-Profil: DuckDB
# Zweck: Ermoeglicht dbt-Build ohne PostgreSQL (fuer CI/CD und lokale Tests)
# DuckDB-Pfad wird per Umgebungsvariable WAREHOUSE_PATH gesetzt
# ============================================================================
omnichannel_platform:
  target: ci
  outputs:
    ci:
      type: duckdb
      path: "{{ env_var('WAREHOUSE_PATH') }}"    # z.B. storage/warehouse/local.duckdb
      threads: 4
