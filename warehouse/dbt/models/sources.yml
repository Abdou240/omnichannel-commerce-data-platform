version: 2

sources:
  - name: raw
    description: Raw-layer sources landed from Olist, Retailrocket, and external enrichment APIs.
    schema: raw
    tables:
      - name: olist_orders
        description: Olist order headers loaded into the raw warehouse schema.
      - name: olist_order_items
        description: Olist order items loaded into the raw warehouse schema.
      - name: olist_customers
        description: Olist customer reference records loaded into the raw warehouse schema.
      - name: olist_products
        description: Olist product attributes loaded into the raw warehouse schema.
      - name: olist_order_payments
        description: Olist payment records loaded into the raw warehouse schema.
      - name: retailrocket_events
        description: Retailrocket replay events loaded from the Kafka replay foundation.
      - name: dummyjson_products
        description: DummyJSON product payloads normalized into raw product rows.
      - name: open_meteo_weather
        description: Open-Meteo daily weather payloads normalized into raw weather rows.
      - name: frankfurter_fx_rates
        description: Frankfurter FX payloads normalized into raw FX rows.
