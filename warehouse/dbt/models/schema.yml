version: 2

models:
  - name: stg_olist_orders
    description: Normalized Olist order headers.
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: order_status
        tests: [not_null]

  - name: stg_olist_order_items
    description: Normalized Olist order items.
    columns:
      - name: order_id
        tests: [not_null]
      - name: order_item_id
        tests: [not_null]

  - name: stg_olist_customers
    description: Olist customer dimension staging.
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: stg_olist_products
    description: Olist product staging.
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: stg_olist_order_payments
    description: Olist payment staging.
    columns:
      - name: order_id
        tests: [not_null]

  - name: stg_retailrocket_events
    description: Normalized Retailrocket clickstream events.
    columns:
      - name: event_id
        tests: [not_null, unique]
      - name: visitor_id
        tests: [not_null]
      - name: event_type
        tests: [not_null]

  - name: stg_open_food_facts_products
    description: Open Food Facts API products normalized for product dimension usage.
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: stg_open_meteo_weather
    description: Daily weather enrichments.
    columns:
      - name: weather_date
        tests: [not_null]
      - name: city
        tests: [not_null]

  - name: stg_frankfurter_fx_rates
    description: Daily FX rates for currency normalization.
    columns:
      - name: rate_date
        tests: [not_null]
      - name: quote_currency
        tests: [not_null]

  - name: int_orders_with_context
    description: Order-grain intermediate model with commerce, customer, weather, and FX context.
    columns:
      - name: order_id
        tests: [not_null, unique]

  - name: int_retailrocket_sessions
    description: Sessionized Retailrocket clickstream.
    columns:
      - name: session_key
        tests: [not_null, unique]

  - name: fct_commerce_orders
    description: Order-grain commerce fact table.
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]

  - name: fct_retailrocket_sessions
    description: Session-grain Retailrocket fact table.
    columns:
      - name: session_key
        tests: [not_null, unique]

  - name: dim_products
    description: Product dimension combining Olist catalog attributes and Open Food Facts enrichment products.
    columns:
      - name: product_key
        tests: [not_null, unique]
      - name: product_id
        tests: [not_null]
