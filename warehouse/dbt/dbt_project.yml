# ============================================================================
# dbt-Projektkonfiguration: omnichannel_platform
# Zweck: Definiert Pfade, Materialisierungsstrategien und Projektstruktur
# Profil: omnichannel_platform (muss in profiles.yml definiert sein)
# ============================================================================
name: omnichannel_platform
version: 1.0.0
config-version: 2

# --- Profil-Referenz ---
# Verweist auf das aktive Profil in ~/.dbt/profiles.yml oder --profiles-dir
profile: omnichannel_platform

# --- Verzeichnisstruktur ---
model-paths: ["models"]          # SQL-Modelle (staging/, intermediate/, marts/)
test-paths: ["tests"]            # Singular-Tests (assert_*.sql)
seed-paths: ["../seeds"]         # Referenzdaten (aktuell leer)
macro-paths: ["macros"]          # Macros (raw_relations.sql)
target-path: "target"            # Build-Artefakte (wird generiert)
clean-targets:
  - "target"
  - "dbt_packages"

# --- Materialisierungsregeln pro Schicht ---
models:
  omnichannel_platform:
    staging:
      +materialized: view         # Staging-Modelle als Views (leichtgewichtig)
      +schema: staging
    intermediate:
      +materialized: view         # Intermediate-Modelle als Views
      +schema: staging
    marts:
      +materialized: table        # Mart-Modelle als physische Tabellen
      +schema: marts
