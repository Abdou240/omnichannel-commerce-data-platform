# ============================================================================
# Olist-Manifest: Tabellen-Mapping fuer lokale Batch-Ingestion
# Zweck: Definiert welche CSV-Dateien welchen Raw-Tabellen zugeordnet werden
# Wird von der Batch-Pipeline gelesen um Olist-Seeds zu laden
# ============================================================================
dataset: olistbr/brazilian-ecommerce
description: Starter manifest for local Olist batch ingestion.

tables:
  - name: olist_orders                    # -> raw.olist_orders
    file_name: olist_orders_dataset.csv
  - name: olist_order_items               # -> raw.olist_order_items
    file_name: olist_order_items_dataset.csv
  - name: olist_customers                 # -> raw.olist_customers
    file_name: olist_customers_dataset.csv
  - name: olist_products                  # -> raw.olist_products
    file_name: olist_products_dataset.csv
  - name: olist_order_payments            # -> raw.olist_order_payments
    file_name: olist_order_payments_dataset.csv

