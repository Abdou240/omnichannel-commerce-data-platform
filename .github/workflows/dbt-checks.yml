# ============================================================================
# Workflow: dbt-checks
# Zweck: dbt-Projekt gegen DuckDB kompilieren und testen (CI-Profil)
# Trigger: Bei jedem Push auf main und bei Pull Requests
# Hinweis: Nutzt DuckDB statt PostgreSQL -- kein externer DB-Service noetig
# ============================================================================
name: dbt-checks

# --- Trigger-Konfiguration ---
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    steps:
      # --- Repository auschecken ---
      - name: Check out repository
        uses: actions/checkout@v4

      # --- Python 3.11 einrichten ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --- Projekt mit dev- und warehouse-Extras installieren ---
      # warehouse-Extra bringt dbt-postgres, dbt-duckdb und dbt-bigquery mit
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,warehouse]"

      # --- CI-Profil (DuckDB) vorbereiten ---
      # Kopiert profiles.ci.yml als aktives dbt-Profil in ein temporaeres Verzeichnis
      - name: Prepare dbt CI profile
        run: |
          mkdir -p "${RUNNER_TEMP}/dbt"
          cp warehouse/dbt/profiles.ci.yml "${RUNNER_TEMP}/dbt/profiles.yml"

      # --- dbt parse: Syntaxpruefung aller Modelle ---
      # Stellt sicher, dass alle SQL-Modelle kompilierbar sind
      - name: Parse dbt project
        run: |
          export WAREHOUSE_PATH="${RUNNER_TEMP}/omnichannel_ci.duckdb"
          dbt parse \
            --project-dir warehouse/dbt \
            --profiles-dir "${RUNNER_TEMP}/dbt"

      # --- dbt build: Modelle materialisieren + Tests ausfuehren ---
      # Baut 9 Staging-Views, 2 Intermediate-Views, 3 Mart-Tables
      # Fuehrt 3 Singular-Tests und Spalten-Tests (not_null, unique) aus
      - name: Build dbt project
        run: |
          export WAREHOUSE_PATH="${RUNNER_TEMP}/omnichannel_ci.duckdb"
          dbt build \
            --project-dir warehouse/dbt \
            --profiles-dir "${RUNNER_TEMP}/dbt"
