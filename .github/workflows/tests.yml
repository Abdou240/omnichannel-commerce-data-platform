# ============================================================================
# Workflow: tests
# Zweck: Alle 27 pytest-Tests ausfuehren (Unit + Integration)
# Trigger: Bei jedem Push auf main und bei Pull Requests
# Hinweis: Kein PostgreSQL noetig -- Tests laufen rein lokal gegen Fixtures
# ============================================================================
name: tests

# --- Trigger-Konfiguration ---
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      # --- Repository auschecken ---
      - name: Check out repository
        uses: actions/checkout@v4

      # --- Python 3.11 einrichten ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --- Projekt mit dev-, batch- und dashboard-Extras installieren ---
      # dashboard-Extra noetig fuer Dashboard-Logik-Tests (pandas, streamlit)
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,batch,dashboard]"

      # --- pytest ausfuehren (27 Tests aus tests/unit + tests/integration) ---
      - name: Run pytest
        run: pytest
