# ============================================================================
# Workflow: lint
# Zweck: Code-Qualitaet sicherstellen (Formatierung, Linting, YAML-Syntax)
# Trigger: Bei jedem Push auf main und bei Pull Requests
# ============================================================================
name: lint

# --- Trigger-Konfiguration ---
# Laeuft bei Push auf main und bei allen Pull Requests
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      # --- Repository auschecken ---
      - name: Check out repository
        uses: actions/checkout@v4

      # --- Python 3.11 einrichten (CI-Standard) ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --- Nur dev-Abhaengigkeiten installieren (ruff, pre-commit) ---
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      # --- Alle pre-commit Hooks ausfuehren ---
      # Umfasst: ruff check, ruff format, trailing-whitespace, YAML-Syntax, TOML-Syntax
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure --color=always
