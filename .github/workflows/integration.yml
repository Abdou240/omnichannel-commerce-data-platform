# ============================================================================
# Workflow: integration
# Zweck: Vollstaendiger End-to-End-Test der gesamten Pipeline
# Trigger: Bei jedem Push auf main und bei Pull Requests
# Besonderheit: Startet einen echten PostgreSQL-18-Service-Container
# ============================================================================
name: integration

# --- Trigger-Konfiguration ---
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  full-ci:
    runs-on: ubuntu-latest

    # --- PostgreSQL-Service-Container ---
    # Wird automatisch gestartet und ist unter localhost:5432 erreichbar
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: commerce_platform
          POSTGRES_USER: commerce
          POSTGRES_PASSWORD: commerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U commerce -d commerce_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    # --- Umgebungsvariablen fuer alle Steps ---
    # Werden von den Python-Pipelines automatisch gelesen
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: commerce_platform
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce

    steps:
      # --- Repository auschecken ---
      - name: Check out repository
        uses: actions/checkout@v4

      # --- Python 3.11 einrichten ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --- Abhaengigkeiten installieren (alles ausser Spark und Dashboard) ---
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,batch,streaming,quality,warehouse,api]"

      # --- DVC-tracked Sample-Dateien wiederherstellen ---
      # Die Dateien sind DVC-tracked; in CI werden sie aus den .dvc-Pointern
      # regeneriert. Bei fehlendem Remote wird ein minimaler Fallback erzeugt.
      - name: Restore DVC-tracked sample data
        run: |
          pip install dvc
          dvc remote modify local_cache url /tmp/dvc-cache || true
          dvc checkout || python -c "
          import json, pathlib
          # Fallback: Dateien manuell erzeugen wenn dvc checkout fehlschlaegt
          pathlib.Path('data/sample/streaming').mkdir(parents=True, exist_ok=True)
          pathlib.Path('data/sample/batch').mkdir(parents=True, exist_ok=True)
          events = [
            '{\"event_id\":\"rr-evt-001\",\"visitor_id\":\"visitor-101\",\"event_type\":\"view\",\"item_id\":\"SKU-1001\",\"transaction_id\":null,\"event_ts\":\"2026-04-03T08:01:00Z\"}',
            '{\"event_id\":\"rr-evt-002\",\"visitor_id\":\"visitor-101\",\"event_type\":\"addtocart\",\"item_id\":\"SKU-1001\",\"transaction_id\":null,\"event_ts\":\"2026-04-03T08:03:00Z\"}',
            '{\"event_id\":\"rr-evt-003\",\"visitor_id\":\"visitor-205\",\"event_type\":\"transaction\",\"item_id\":\"SKU-2044\",\"transaction_id\":\"TX-5501\",\"event_ts\":\"2026-04-03T08:11:00Z\"}'
          ]
          pathlib.Path('data/sample/streaming/retailrocket_events.jsonl').write_text('\n'.join(events) + '\n')
          pathlib.Path('data/sample/batch/open_food_facts_products_sample.json').write_text(json.dumps({'products': [{'code': '3017620422003', 'product_name': 'Nutella', 'brands': 'Nutella', 'categories': 'Chocolate spreads', 'ecoscore_grade': 'unknown'}]}, indent=2))
          print('DVC checkout failed, created fallback sample data')
          "

      # --- PostgreSQL-Schemas und Raw-Tabellen initialisieren ---
      # Fuehrt die DDL-Skripte aus sql/postgres/init/ aus
      - name: Initialize raw schemas
        run: |
          PGPASSWORD=commerce psql -h localhost -U commerce -d commerce_platform \
            -f sql/postgres/init/001_create_local_warehouse_schemas.sql \
            -f sql/postgres/init/002_create_raw_placeholder_tables.sql

      # --- Lint-Pruefung (ruff check) ---
      - name: Run lint
        run: ruff check .

      # --- Alle 27 pytest-Tests ausfuehren ---
      - name: Run unit tests
        run: pytest tests/ -v

      # --- Batch-Ingestion: Nur Olist Seeds (keine API-Aufrufe in CI) ---
      - name: Run batch ingestion (Olist seeds only)
        run: python -m omnichannel_platform.batch.commerce_batch_ingestion --env dev --source olist

      # --- Verifizierung: Olist-Daten in raw.ingestion_audit pruefen ---
      - name: Verify Olist raw data loaded
        run: |
          PGPASSWORD=commerce psql -h localhost -U commerce -d commerce_platform -c "
            SELECT source_name, row_count FROM raw.ingestion_audit WHERE source_name = 'olist';
          " | grep -q olist

      # --- Streaming-Replay: Retailrocket JSONL -> PostgreSQL ---
      - name: Run streaming replay
        run: python -m omnichannel_platform.streaming.clickstream_consumer --env dev --mode replay

      # --- Verifizierung: Retailrocket-Events in raw-Tabelle pruefen ---
      - name: Verify replay events loaded
        run: |
          PGPASSWORD=commerce psql -h localhost -U commerce -d commerce_platform -c "
            SELECT count(*) as cnt FROM raw.retailrocket_events;
          " | grep -qE "[1-9]"

      # --- Quality-Checks im Non-Strict-Modus ---
      - name: Run quality checks (non-strict)
        run: python -m omnichannel_platform.quality.rules_catalog --non-strict

      # --- dbt-Build gegen echtes PostgreSQL ---
      # Erstellt ein temporaeres Profil fuer PostgreSQL (nicht DuckDB)
      - name: Build dbt project against PostgreSQL
        run: |
          mkdir -p /tmp/dbt-profiles
          cat > /tmp/dbt-profiles/profiles.yml << 'PROFILES'
          omnichannel_platform:
            target: ci-pg
            outputs:
              ci-pg:
                type: postgres
                host: localhost
                user: commerce
                password: commerce
                port: 5432
                dbname: commerce_platform
                schema: staging
                threads: 4
          PROFILES
          dbt build --project-dir warehouse/dbt --profiles-dir /tmp/dbt-profiles --target ci-pg

      # --- Verifizierung: Mart-Tabelle hat Daten ---
      - name: Verify mart tables populated
        run: |
          PGPASSWORD=commerce psql -h localhost -U commerce -d commerce_platform -c "
            SELECT count(*) as cnt FROM marts.fct_commerce_orders;
          " | grep -qE "[1-9]"

      # --- Docker-Image-Builds als Smoke-Test ---
      # Stellt sicher, dass alle drei Dockerfile-Targets fehlerfrei bauen
      - name: Build Docker images
        run: |
          docker build --target pipeline -t omnichannel-platform-pipeline:test .
          docker build --target api -t omnichannel-platform-api:test .
          docker build --target dashboard -t omnichannel-platform-dashboard:test .
