# ============================================================================
# Workflow: deploy-gcp
# Zweck: Dashboard-Image bauen, in Artifact Registry pushen, auf Cloud Run deployen
# Trigger: Manuell (workflow_dispatch) mit Umgebungswahl (dev/prod)
# Voraussetzung: GitHub Secrets muessen konfiguriert sein (siehe unten)
# ============================================================================
name: deploy-gcp

# --- Manueller Trigger mit Umgebungswahl ---
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

# --- Globale Umgebungsvariablen ---
env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}           # GCP-Projekt-ID aus Secrets
  GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}   # Region (Default: us-central1)
  ARTIFACT_REPO: omnichannel-platform                      # Name des Artifact Registry Repos
  DASHBOARD_SERVICE: omnichannel-dashboard                 # Name des Cloud Run Services

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # --- Berechtigungen fuer OIDC und Repository-Zugriff ---
    permissions:
      contents: read
      id-token: write

    steps:
      # --- Repository auschecken ---
      - name: Check out repository
        uses: actions/checkout@v4

      # --- GCP-Authentifizierung mit Service-Account-Key ---
      # Benoetigt Secret: GCP_SA_KEY (JSON-Credentials)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # --- Google Cloud SDK einrichten ---
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # --- Docker fuer Artifact Registry konfigurieren ---
      # Erlaubt docker push in die regionale Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      # --- Dashboard-Image bauen und pushen ---
      # Zwei Tags: Commit-SHA (fuer Traceability) und latest
      - name: Build and push dashboard image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/dashboard:${{ github.sha }}"
          IMAGE_LATEST="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/dashboard:latest"
          docker build --target dashboard -t "$IMAGE" -t "$IMAGE_LATEST" .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"

      # --- Cloud Run Deployment ---
      # Konfiguriert Umgebungsvariablen fuer PostgreSQL-Verbindung
      # Benoetigt Secrets: POSTGRES_HOST, POSTGRES_USER, POSTGRES_PASSWORD
      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/dashboard:${{ github.sha }}"
          gcloud run deploy "${{ env.DASHBOARD_SERVICE }}" \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --port 8080 \
            --allow-unauthenticated \
            --set-env-vars "POSTGRES_HOST=${{ secrets.POSTGRES_HOST }},POSTGRES_PORT=5432,POSTGRES_DB=commerce_platform,POSTGRES_USER=${{ secrets.POSTGRES_USER }},POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }},DASHBOARD_WAREHOUSE_SCHEMA=staging,DASHBOARD_RAW_SCHEMA=raw" \
            --min-instances 0 \
            --max-instances 2 \
            --memory 512Mi \
            --cpu 1

      # --- Service-URL ausgeben ---
      - name: Print service URL
        run: |
          gcloud run services describe "${{ env.DASHBOARD_SERVICE }}" \
            --region "${{ env.GCP_REGION }}" \
            --format "value(status.url)"
