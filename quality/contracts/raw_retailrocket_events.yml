# ============================================================================
# Quality Contract: raw.retailrocket_events
# Zweck: Deklarative Qualitaetsregeln fuer Retailrocket-Clickstream-Events
# Owner: data-platform
# ============================================================================
dataset: raw.retailrocket_events
owner: data-platform
description: Starter contract for Retailrocket replay events after Kafka landing.

rules:
  # Jedes Event muss eine eindeutige event_id haben
  - name: event_id_not_null
    expectation: event_id must be present

  # Jedes Event muss einem Besucher zugeordnet sein
  - name: visitor_id_not_null
    expectation: visitor_id must be present

  # Event-Typ muss ein bekannter Wert sein (view, addtocart, transaction)
  - name: event_type_domain
    expectation: event_type must be one of view, addtocart, or transaction
