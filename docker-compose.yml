services:
  postgres:
    image: postgres:16-alpine
    container_name: omnichannel-postgres
    environment:
      POSTGRES_DB: commerce_platform
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/postgres/init:/docker-entrypoint-initdb.d:ro

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
    container_name: omnichannel-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"

  mongo:
    image: mongo:7
    container_name: omnichannel-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./nosql/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: omnichannel-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  kestra:
    image: kestra/kestra:0.20.8
    container_name: omnichannel-kestra
    user: "root"
    command: server standalone
    ports:
      - "8080:8080"
    volumes:
      - kestra_data:/app/storage
      - ./orchestration/kestra:/app/repo/orchestration/kestra
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          server:
            basic-auth:
              enabled: false
          repository:
            type: h2
          queue:
            type: h2
          storage:
            type: local
            local:
              basePath: /app/storage
    # TODO: switch Kestra metadata and queue storage to Postgres for shared environments.
    # TODO: pass source-specific secrets and environment variables via Kestra variables or secrets.

volumes:
  postgres_data:
  mongo_data:
  minio_data:
  kestra_data:

