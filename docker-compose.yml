# ============================================================================
# Docker Compose: Omnichannel Commerce Data Platform
# Zweck: Lokaler Entwicklungs-Stack mit 9 Services
# Start: docker compose up -d
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # PostgreSQL 18 -- Lokales Warehouse und Raw-Landing-Zone
  # Enthaelt die Schemas: raw, staging, marts
  # Init-Skripte unter sql/postgres/init/ werden beim ersten Start ausgefuehrt
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:18
    container_name: omnichannel-postgres
    environment:
      POSTGRES_DB: commerce_platform
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./sql/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commerce -d commerce_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # pgAdmin -- Web-UI fuer PostgreSQL (erreichbar unter http://localhost:8085)
  # Login: admin@admin.com / root
  # --------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: omnichannel-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "8085:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # Redpanda v25.3.9 -- Kafka-kompatibler Streaming-Broker
  # Externe Kafka-API auf Port 9092, interne auf 29092
  # Pandaproxy (REST) auf Port 8082
  # --------------------------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.9
    container_name: omnichannel-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "1"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr
      - internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr
      - internal://0.0.0.0:28082,external://0.0.0.0:8082
    ports:
      - "9092:9092"      # Kafka-API (extern)
      - "8082:8082"      # Pandaproxy REST-API
      - "29092:29092"    # Kafka-API (intern, fuer Container-zu-Container)
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Redpanda Console -- Web-UI fuer Topics und Consumer-Groups
  # Erreichbar unter http://localhost:8484
  # --------------------------------------------------------------------------
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.2.2
    container_name: omnichannel-redpanda-console
    ports:
      - "8484:8080"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:29092"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    depends_on:
      - redpanda

  # --------------------------------------------------------------------------
  # MongoDB 7 -- Raw-Document-Store fuer JSON-Payloads
  # Collections und Indexes werden per init.js angelegt
  # --------------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: omnichannel-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./nosql/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro

  # --------------------------------------------------------------------------
  # MinIO -- Lokales S3-kompatibles Object Storage
  # API auf Port 9000, Web-Console auf Port 9001
  # Login: minio / minio123
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: omnichannel-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"    # S3-API
      - "9001:9001"    # Web-Console
    volumes:
      - minio_data:/data

  # --------------------------------------------------------------------------
  # Kestra v1.1 -- Orchestrierungsplattform
  # Web-UI auf http://localhost:8080, API auf Port 8081
  # Flow-Dateien werden aus orchestration/kestra/ gemountet
  # Nutzt PostgreSQL als Backend (Queue + Repository)
  # --------------------------------------------------------------------------
  kestra:
    image: kestra/kestra:v1.1
    container_name: omnichannel-kestra
    user: "root"
    command: server standalone
    ports:
      - "8080:8080"    # Web-UI
      - "8081:8081"    # API
    volumes:
      - kestra_data:/app/storage
      - ./orchestration/kestra:/app/repo/orchestration/kestra
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/commerce_platform
            driverClassName: org.postgresql.Driver
            username: commerce
            password: commerce
        kestra:
          server:
            basicAuth:
              enabled: false
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
    depends_on:
      postgres:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # Platform Runner -- Idle-Container mit allen Pipeline-Abhaengigkeiten
  # Ermoeglicht Pipeline-Ausfuehrung per: docker compose exec platform-runner ...
  # --------------------------------------------------------------------------
  platform-runner:
    build:
      context: .
      target: pipeline
    container_name: omnichannel-platform-runner
    entrypoint: ["/bin/sh", "-lc"]
    command: sleep infinity
    environment:
      ENVIRONMENT: dev
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: commerce_platform
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce
      MONGO_URI: mongodb://mongo:27017
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      WAREHOUSE_PATH: /app/storage/warehouse/local.duckdb
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      mongo:
        condition: service_started

  # --------------------------------------------------------------------------
  # Dashboard -- Streamlit-Frontend mit 8 Seiten
  # Erreichbar unter http://localhost:8501
  # Liest Daten aus PostgreSQL (Raw + Staging + Marts)
  # --------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      target: dashboard
    container_name: omnichannel-dashboard
    ports:
      - "8501:8080"    # Host:8501 -> Container:8080 (Dockerfile nutzt PORT=8080)
    environment:
      PORT: "8080"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: commerce_platform
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce
      DASHBOARD_WAREHOUSE_SCHEMA: staging
      DASHBOARD_RAW_SCHEMA: raw
    depends_on:
      postgres:
        condition: service_healthy

# --- Persistente Volumes ---
volumes:
  postgres_data:     # PostgreSQL-Daten
  pgadmin_data:      # pgAdmin-Konfiguration
  mongo_data:        # MongoDB-Daten
  minio_data:        # MinIO Object Storage
  kestra_data:       # Kestra-Artefakte und Storage
